<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Rapor Mengaji SD Anak Saleh</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body class="min-h-screen bg-[linear-gradient(135deg,#fffaf0_0%,#f7f2e8_45%,#e7f4ef_100%)]">
    <main class="grid min-h-screen place-items-center px-5 py-10 islamic-grid">
      <section class="glass-panel w-full max-w-md rounded-[8px] p-6 sm:p-8">
        <a href="/" class="inline-flex items-center gap-2 text-sm font-bold text-emeraldDeep">
          <svg aria-hidden="true" class="h-4 w-4" viewBox="0 0 24 24" fill="none">
            <path d="M19 12H5m6-6-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          Kembali
        </a>

        <div class="mt-8">
          <p class="text-xs font-bold uppercase tracking-[0.24em] text-dateGold">SD Anak Saleh</p>
          <h1 class="mt-3 font-display text-3xl font-extrabold text-emeraldDeep">Login Rapor Mengaji</h1>
          <p class="mt-3 text-sm leading-6 text-ink/60">Masuk untuk mengelola nilai, catatan, dan rapor mengaji santri.</p>
        </div>

        <form class="mt-8 space-y-5">
          <label class="block">
            <span class="text-sm font-bold text-ink/70">Email atau username</span>
            <input class="mt-2 h-12 w-full rounded-[8px] border border-emeraldDeep/10 bg-white/80 px-4 text-sm font-medium outline-none transition focus:border-jade focus:ring-4 focus:ring-jade/15" type="text" placeholder="guru@sdanaksaleh.sch.id" />
          </label>
          <label class="block">
            <span class="text-sm font-bold text-ink/70">Password</span>
            <input class="mt-2 h-12 w-full rounded-[8px] border border-emeraldDeep/10 bg-white/80 px-4 text-sm font-medium outline-none transition focus:border-jade focus:ring-4 focus:ring-jade/15" type="password" placeholder="Masukkan password" />
          </label>
          <button class="btn-primary w-full" type="button">Masuk</button>

          <div class="flex items-center gap-3">
            <span class="h-px flex-1 bg-emeraldDeep/10"></span>
            <span class="text-xs font-bold uppercase tracking-[0.18em] text-ink/45">atau</span>
            <span class="h-px flex-1 bg-emeraldDeep/10"></span>
          </div>

          <button data-google-login class="inline-flex h-12 w-full items-center justify-center gap-3 rounded-[8px] border border-emeraldDeep/10 bg-white/80 px-4 text-sm font-bold text-ink shadow-sm transition duration-300 hover:-translate-y-0.5 hover:border-dateGold/50 hover:bg-white focus:outline-none focus:ring-4 focus:ring-dateGold/20 disabled:pointer-events-none" type="button" aria-label="Login dengan akun Google">
            <svg aria-hidden="true" class="h-5 w-5" viewBox="0 0 18 18">
              <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62Z" />
              <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.83.86-3.04.86-2.34 0-4.33-1.58-5.04-3.7H.94v2.34A9 9 0 0 0 9 18Z" />
              <path fill="#FBBC05" d="M3.96 10.72A5.4 5.4 0 0 1 3.68 9c0-.6.1-1.18.28-1.72V4.94H.94A9 9 0 0 0 0 9c0 1.45.34 2.82.94 4.06l3.02-2.34Z" />
              <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.46 3.44 1.35l2.58-2.58C13.46.9 11.42 0 9 0A9 9 0 0 0 .94 4.94l3.02 2.34C4.67 5.16 6.66 3.58 9 3.58Z" />
            </svg>
            Login dengan Google
          </button>
          <p data-login-status class="hidden text-center text-sm font-semibold leading-6"></p>
        </form>
      </section>
    </main>
    <script src="/vendor/pocketbase/pocketbase.umd.js"></script>
    <script src="/assets/js/login.js"></script>
  </body>
</html>
