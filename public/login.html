<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Rapor Mengaji SD Anak Saleh</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body class="min-h-screen bg-[linear-gradient(135deg,#fffaf0_0%,#f7f2e8_45%,#e7f4ef_100%)]">
    <main class="grid min-h-screen place-items-center px-5 py-10 islamic-grid">
      <section class="glass-panel w-full max-w-md rounded-[8px] p-6 sm:p-8">
        <a href="/" class="inline-flex items-center gap-2 text-sm font-bold text-emeraldDeep">
          <svg aria-hidden="true" class="h-4 w-4" viewBox="0 0 24 24" fill="none">
            <path d="M19 12H5m6-6-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          Kembali
        </a>

        <div class="mt-8">
          <p class="text-xs font-bold uppercase tracking-[0.24em] text-dateGold">SD Anak Saleh</p>
          <h1 class="mt-3 font-display text-3xl font-extrabold text-emeraldDeep">Login Rapor Mengaji</h1>
          <p class="mt-3 text-sm leading-6 text-ink/60">Masuk untuk mengelola nilai, catatan, dan rapor mengaji santri.</p>
        </div>

        <form data-login-form class="mt-8 space-y-5">
          <label class="block">
            <span class="text-sm font-bold text-ink/70">Email atau username</span>
            <input data-login-email class="mt-2 h-12 w-full rounded-[8px] border border-emeraldDeep/10 bg-white/80 px-4 text-sm font-medium outline-none transition focus:border-jade focus:ring-4 focus:ring-jade/15" type="text" placeholder="guru@sdanaksaleh.sch.id" required />
          </label>

          <button data-login-submit class="btn-primary w-full" type="submit">Masuk</button>
          <p data-login-status class="hidden text-center text-sm font-semibold leading-6"></p>
        </form>
      </section>
    </main>
    <script src="/vendor/pocketbase/pocketbase.umd.js"></script>
    <script src="/assets/js/login.js"></script>
  </body>
</html>
